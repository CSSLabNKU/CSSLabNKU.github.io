<style>
	html,
	body {
		min-height: 100%;
	}

	body {
		display: flex;
		flex-direction: column;
		min-height: 100vh;
	}

	body > .container-fluid {
		width: 100%;
		flex: 1 0 auto;
	}

	.site-footer {
		flex-shrink: 0;
		margin-top: 48px;
		padding: 22px 0 24px;
		border-top: 1px solid rgba(101, 85, 194, 0.22);
		background: #faf9fd;
		color: #555;
		font-size: 14px;
		line-height: 1.6;
	}

	.site-footer__inner {
		display: flex;
		align-items: center;
		justify-content: space-between;
		gap: 20px;
	}

	.site-footer p {
		margin: 0;
	}

	.site-footer__name {
		font-weight: 600;
		color: #2a2a2a;
	}

	.site-footer__note {
		color: #777;
	}

	.site-footer__links {
		display: flex;
		flex-wrap: wrap;
		justify-content: flex-end;
		gap: 8px 18px;
	}

	.site-footer__links a {
		color: #6555c2;
		text-decoration: none;
	}

	.site-footer__links a:hover,
	.site-footer__links a:focus {
		color: #5040ae;
		text-decoration: underline;
	}

	.back-to-top {
		position: fixed;
		right: 22px;
		bottom: 22px;
		z-index: 1000;
		display: inline-flex;
		align-items: center;
		justify-content: center;
		width: 44px;
		height: 44px;
		padding: 0;
		border: 1px solid rgba(101, 85, 194, 0.28);
		border-radius: 50%;
		background: rgba(255, 255, 255, 0.96);
		box-shadow: 0 4px 14px rgba(42, 42, 42, 0.14);
		color: #6555c2;
		font: inherit;
		font-size: 22px;
		line-height: 1;
		cursor: pointer;
		opacity: 0;
		visibility: hidden;
		transform: translateY(8px);
		transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
	}

	.back-to-top.is-visible {
		opacity: 1;
		visibility: visible;
		transform: translateY(0);
	}

	.back-to-top:hover,
	.back-to-top:focus-visible {
		border-color: #6555c2;
		background: #6555c2;
		color: #fff;
		outline: none;
	}

	@media screen and (max-width: 766px) {
		.site-footer {
			margin-top: 34px;
			padding: 20px 0;
			text-align: center;
		}

		.site-footer__inner {
			flex-direction: column;
			gap: 12px;
		}

		.site-footer__links {
			justify-content: center;
		}

		.back-to-top {
			right: 14px;
			bottom: 14px;
			width: 40px;
			height: 40px;
		}
	}
</style>

<footer class="site-footer" role="contentinfo">
	<div class="container-fluid site-footer__inner">
		<div>
			<p class="site-footer__name">Ding Wang · Password Cryptography</p>
			<p class="site-footer__note">Nankai University · &copy; {{ site.time | date: "%Y" }}</p>
		</div>

		<nav class="site-footer__links" aria-label="Footer navigation">
			<a href="{{ site.url }}{{ site.baseurl }}/" target="_self">Home</a>
			<a href="{{ site.url }}{{ site.baseurl }}/publications" target="_self">Publications</a>
			<a href="mailto:wangding@nankai.edu.cn">Email</a>
		</nav>
	</div>
</footer>

<button class="back-to-top" type="button" aria-label="Back to top" title="Back to top">&uarr;</button>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
<script src="{{ site.url }}{{ site.baseurl }}/js/bootstrap.min.js"></script>
<script>
	(function () {
		var button = document.querySelector('.back-to-top');
		if (!button) return;

		function updateButton() {
			button.classList.toggle('is-visible', window.pageYOffset > 320);
		}

		button.addEventListener('click', function () {
			var reduceMotion = window.matchMedia &&
				window.matchMedia('(prefers-reduced-motion: reduce)').matches;
			window.scrollTo({ top: 0, behavior: reduceMotion ? 'auto' : 'smooth' });
		});

		window.addEventListener('scroll', updateButton, { passive: true });
		updateButton();
	}());
</script>
